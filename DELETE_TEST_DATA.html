<!DOCTYPE html>
<html>
<head>
    <title>Delete Test Entries</title>
    <style>
        body { font-family: Arial; padding: 40px; background: #f5f5f5; }
        .box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { color: #2E7D32; }
        button { background: #F57F17; color: white; padding: 12px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: bold; }
        button:hover { background: #E65100; }
        #output { margin-top: 20px; padding: 15px; background: #E8F5E9; border-radius: 4px; border-left: 4px solid #2E7D32; }
        .entry { padding: 10px; margin: 5px 0; background: #FFF3E0; border-left: 3px solid #F57F17; }
    </style>
</head>
<body>
    <div class="box">
        <h1>🗑️ Delete Test Expense Entries</h1>
        <p>This will delete the 4 test entries from Rabona Holdings.</p>

        <div style="margin: 20px 0;">
            <div class="entry">26/1/4 - Urban City - Marketing Materials - €500.00</div>
            <div class="entry">26/1/3 - BAD City Hall - Office Supplies - €125.00</div>
            <div class="entry">26/1/2 - Olympic Airways - €450.00</div>
            <div class="entry">26/1/1 - Blue Lagoon Hotel - €300.00</div>
        </div>

        <button onclick="deleteTestEntries()">Delete All 4 Test Entries</button>

        <div id="output"></div>
    </div>

    <script>
        function deleteTestEntries() {
            const output = document.getElementById('output');
            const testRefs = ['26/1/4', '26/1/3', '26/1/2', '26/1/1'];

            // Get expenses
            const expensesJson = localStorage.getItem('expenses_Rabona');
            let expenses = [];

            try {
                expenses = JSON.parse(expensesJson) || [];
            } catch(e) {
                output.innerHTML = '<p style="color: #C62828;">❌ Error reading expenses data</p>';
                return;
            }

            output.innerHTML = '<p><strong>Processing...</strong></p>';

            let deleted = 0;
            let originalCount = expenses.length;

            // Log what we're looking at
            console.log('Total expenses:', expenses.length);
            console.log('Looking for refs:', testRefs);
            console.log('Sample entry:', expenses[0]);

            // Filter out test entries
            const filtered = expenses.filter(e => {
                const ref = e.refNumber || e.generalReference || '';
                const found = testRefs.includes(ref);
                if (found) {
                    console.log('Deleting:', ref, e.vendor);
                    deleted++;
                    return false;
                }
                return true;
            });

            // Save
            localStorage.setItem('expenses_Rabona', JSON.stringify(filtered));

            // Show result
            let html = '<h3 style="color: #2E7D32; margin-top: 0;">✅ Cleanup Complete</h3>';
            html += '<p><strong>Deleted:</strong> ' + deleted + ' entries</p>';
            html += '<p><strong>Remaining:</strong> ' + filtered.length + ' entries</p>';

            if (deleted > 0) {
                html += '<p style="color: #2E7D32; margin-top: 15px; font-weight: bold;">✅ Success! Please refresh the main expense tracker to see the changes.</p>';
            } else {
                html += '<p style="color: #F57F17;">⚠️ No test entries found. They may have already been deleted.</p>';
            }

            output.innerHTML = html;
        }
    </script>
</body>
</html>
